<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin PIN — Canary Engine</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e1a;
            color: #e0e6f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #0d1117;
            border-bottom: 1px solid #1e3a5f;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            color: #58a6ff;
            letter-spacing: 2px;
        }

        .header h1 span { color: #f85149; }

        .logout-link {
            color: #8b949e;
            font-size: 12px;
            text-decoration: none;
        }

        .logout-link:hover { color: #f85149; }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .pin-card {
            background: #0d1117;
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .lock-icon { font-size: 48px; margin-bottom: 16px; }

        .title {
            font-size: 16px;
            color: #f85149;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 32px;
        }

        .pin-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #1e3a5f;
            border: 2px solid #30608a;
            transition: all 0.2s;
        }

        .pin-dot.filled {
            background: #58a6ff;
            border-color: #58a6ff;
        }

        .pin-dot.error {
            background: #f85149;
            border-color: #f85149;
        }

        .error-msg {
            color: #f85149;
            font-size: 12px;
            height: 24px;
            margin-bottom: 16px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .key-btn {
            background: #161b22;
            border: 1px solid #1e3a5f;
            color: #e0e6f0;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.15s;
        }

        .key-btn:hover {
            background: #1e3a5f;
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .key-btn:active { transform: scale(0.95); }

        .key-btn.clear {
            color: #f85149;
            border-color: #da3633;
            font-size: 12px;
        }

        .key-btn.enter {
            color: #3fb950;
            border-color: #238636;
            font-size: 12px;
        }

        .step-info {
            margin-top: 24px;
            font-size: 11px;
            color: #8b949e;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🛡️ CANARY ENGINE <span>ADMIN</span></h1>
    <a href="/logout" class="logout-link">← Back to Login</a>
</div>

<div class="container">
    <div class="pin-card">
        <div class="lock-icon">🔑</div>
        <div class="title">ADMIN VERIFICATION</div>
        <div class="subtitle">
            Enter your 6-digit admin PIN
        </div>

        <div class="pin-display">
            <div class="pin-dot" id="dot-0"></div>
            <div class="pin-dot" id="dot-1"></div>
            <div class="pin-dot" id="dot-2"></div>
            <div class="pin-dot" id="dot-3"></div>
            <div class="pin-dot" id="dot-4"></div>
            <div class="pin-dot" id="dot-5"></div>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <div class="keypad">
            <button class="key-btn"
                onclick="pressKey('1')">1</button>
            <button class="key-btn"
                onclick="pressKey('2')">2</button>
            <button class="key-btn"
                onclick="pressKey('3')">3</button>
            <button class="key-btn"
                onclick="pressKey('4')">4</button>
            <button class="key-btn"
                onclick="pressKey('5')">5</button>
            <button class="key-btn"
                onclick="pressKey('6')">6</button>
            <button class="key-btn"
                onclick="pressKey('7')">7</button>
            <button class="key-btn"
                onclick="pressKey('8')">8</button>
            <button class="key-btn"
                onclick="pressKey('9')">9</button>
            <button class="key-btn clear"
                onclick="clearPin()">CLEAR</button>
            <button class="key-btn"
                onclick="pressKey('0')">0</button>
            <button class="key-btn enter"
                onclick="submitPin()">ENTER</button>
        </div>

        <div class="step-info">
            Step 2 of 2 — PIN Verification
        </div>
    </div>
</div>

<script>
    let currentPin = "";
    const PIN_LENGTH = 6;

    function pressKey(digit) {
        if (currentPin.length >= PIN_LENGTH) return;
        currentPin += digit;
        updateDots();
        if (currentPin.length === PIN_LENGTH) {
            setTimeout(submitPin, 200);
        }
    }

    function clearPin() {
        currentPin = "";
        updateDots();
        document.getElementById("error-msg").textContent = "";
        for (let i = 0; i < PIN_LENGTH; i++) {
            document.getElementById(`dot-${i}`)
                .classList.remove("error");
        }
    }

    function updateDots() {
        for (let i = 0; i < PIN_LENGTH; i++) {
            const dot = document.getElementById(`dot-${i}`);
            dot.classList.toggle("filled", i < currentPin.length);
        }
    }

    async function submitPin() {
        if (currentPin.length !== PIN_LENGTH) return;

        try {
            const res = await fetch("/api/verify_pin", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({pin: currentPin})
            });
            const data = await res.json();

            if (data.success) {
                window.location.href = data.redirect;
            } else {
                document.getElementById("error-msg")
                    .textContent = "❌ " + data.message;
                for (let i = 0; i < PIN_LENGTH; i++) {
                    document.getElementById(`dot-${i}`)
                        .classList.add("error");
                }
                setTimeout(clearPin, 1000);
            }
        } catch(e) {
            document.getElementById("error-msg")
                .textContent = "❌ Connection error";
        }
    }

    document.addEventListener("keydown", (e) => {
        if (e.key >= "0" && e.key <= "9") pressKey(e.key);
        if (e.key === "Backspace") {
            currentPin = currentPin.slice(0, -1);
            updateDots();
        }
        if (e.key === "Enter") submitPin();
    });
</script>

</body>
</html>
